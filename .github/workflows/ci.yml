name: Customer Support Automation CI

on:
  push:
    branches:
      - master
      - main
      - develop

  pull_request:
    branches:
      - master
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Create Test Environment File
        run: |
          echo "GROQ_API_KEY=dummy_key" > .env
          echo "OLLAMA_URL=http://localhost:11434/api/generate" >> .env
          echo "MODEL_NAME=llama3.2" >> .env

      - name: Verify Python Files
        run: |
          python -m py_compile app.py

      - name: Verify Agent Modules
        run: |
          python -m py_compile agents/query_agent.py
          python -m py_compile agents/order_agent.py
          python -m py_compile agents/recommendation_agent.py

      - name: Verify Service Modules
        run: |
          python -m py_compile services/groq_service.py
          python -m py_compile services/ollama_service.py
          python -m py_compile services/llm_service.py

      - name: Verify Utils
        run: |
          find utils -name "*.py" -exec python -m py_compile {} \;

      - name: Project Structure Check
        run: |
          test -f app.py
          test -f requirements.txt
          test -d agents
          test -d services
          test -d Frontend
          test -d data

      - name: CI Completed
        run: echo "Customer Support Automation CI completed successfully!"
